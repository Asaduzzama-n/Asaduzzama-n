<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <!-- Radial gradient for the eye background - glowing red -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff3333;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#cc0000;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0000;stop-opacity:1" />
    </radialGradient>

    <!-- Inner iris gradient -->
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6666;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#cc0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#660000;stop-opacity:1" />
    </radialGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="outerRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444" />
      <stop offset="50%" style="stop-color:#990000" />
      <stop offset="100%" style="stop-color:#ff4444" />
    </linearGradient>

    <!-- Filter for glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background for contrast -->
  <rect width="800" height="200" fill="#0a0a0f" />

  <!-- Background Sharingan pattern (subtle) -->
  <g opacity="0.08">
    <circle cx="150" cy="100" r="30" fill="none" stroke="#ff3333" stroke-width="0.5"/>
    <circle cx="250" cy="100" r="30" fill="none" stroke="#ff3333" stroke-width="0.5"/>
    <circle cx="350" cy="100" r="30" fill="none" stroke="#ff3333" stroke-width="0.5"/>
    <circle cx="450" cy="100" r="30" fill="none" stroke="#ff3333" stroke-width="0.5"/>
    <circle cx="550" cy="100" r="30" fill="none" stroke="#ff3333" stroke-width="0.5"/>
    <circle cx="650" cy="100" r="30" fill="none" stroke="#ff3333" stroke-width="0.5"/>
  </g>

  <!-- ====== MAIN SHARINGAN EYE ====== -->
  <g transform="translate(400, 100)" filter="url(#softGlow)">

    <!-- Outer glow aura -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#ff000044" stroke-width="8" opacity="0.5">
      <animate attributeName="r" values="80;90;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Eye white (sclera) - slightly visible at edges -->
    <rect x="-75" y="-18" width="150" height="36" rx="18" fill="#1a0505" stroke="#ff2222" stroke-width="1.5" opacity="0.8"/>

    <!-- Main eye shape (almond/sharigan outline) -->
    <path d="M -70 0 
             C -70 -22, -40 -28, 0 -28 
             C 40 -28, 70 -22, 70 0 
             C 70 22, 40 28, 0 28 
             C -40 28, -70 22, -70 0 Z" 
          fill="#0a0000" stroke="url(#outerRing)" stroke-width="2.5"/>

    <!-- Iris - Red with pattern -->
    <circle cx="0" cy="0" r="26" fill="url(#iris)" stroke="#ff2222" stroke-width="1"/>

    <!-- Mangekyō Pattern - 3-point star/wheel -->
    <g fill="none" stroke="#ff1111" stroke-width="2.5">
      <!-- Top blade -->
      <path d="M 0 -22 L 4 -8 L -4 -8 Z" fill="#ff1111" opacity="0.9"/>
      <path d="M 0 -22 Q 6 -12 0 -2" stroke="#ff4444" stroke-width="1.5" fill="none"/>
      
      <!-- Bottom-right blade -->
      <path d="M 19 11 L 7 5 L 6 13 Z" fill="#ff1111" opacity="0.9"/>
      <path d="M 19 11 Q 12 6 4 12" stroke="#ff4444" stroke-width="1.5" fill="none"/>
      
      <!-- Bottom-left blade -->
      <path d="M -19 11 L -7 5 L -6 13 Z" fill="#ff1111" opacity="0.9"/>
      <path d="M -19 11 Q -12 6 -4 12" stroke="#ff4444" stroke-width="1.5" fill="none"/>

      <!-- Outer ring pattern -->
      <circle cx="0" cy="0" r="18" stroke="#ff2222" stroke-width="1"/>
      <circle cx="0" cy="0" r="10" stroke="#ff3333" stroke-width="0.8"/>
    </g>

    <!-- Tomoe (comma-shaped swirls) - 3 tomoe around the iris -->
    <g fill="#cc0000" filter="url(#glow)">
      <!-- Top tomoe -->
      <path d="M 0 -16 C 5 -16, 8 -20, 6 -24 C 4 -20, 0 -19, 0 -16 Z" fill="#ff3333" opacity="0.9"/>
      
      <!-- Bottom-right tomoe -->
      <path d="M 14 8 C 17 5, 19 0, 16 -2 C 14 2, 12 5, 14 8 Z" fill="#ff3333" opacity="0.9"/>
      
      <!-- Bottom-left tomoe -->
      <path d="M -14 8 C -17 5, -19 0, -16 -2 C -14 2, -12 5, -14 8 Z" fill="#ff3333" opacity="0.9"/>
    </g>

    <!-- Pupil (central dot) -->
    <circle cx="0" cy="0" r="4" fill="#000000" opacity="0.95"/>

    <!-- Pupil highlight (light reflection) -->
    <circle cx="-2" cy="-2" r="1.5" fill="#ff8888" opacity="0.7"/>

    <!-- Subtle blood vessel texture on edges -->
    <g stroke="#990000" stroke-width="0.8" fill="none" opacity="0.4">
      <path d="M -65 -5 Q -55 -10 -50 -8" />
      <path d="M 65 3 Q 55 8 50 5" />
      <path d="M -60 10 Q -50 15 -45 12" />
      <path d="M 60 -12 Q 50 -16 45 -14" />
    </g>

    <!-- Animated pupil pulse -->
    <circle cx="0" cy="0" r="4" fill="none" stroke="#ff6666" stroke-width="0.5" opacity="0.6">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ====== NAME TEXT with Sharingan Style ====== -->
  <g transform="translate(400, 175)">
    <!-- Name shadow/glow -->
    <text x="0" y="0" text-anchor="middle" font-family="'Trebuchet MS', 'Courier New', monospace" font-size="32" font-weight="bold" letter-spacing="8" fill="none" stroke="#ff333344" stroke-width="2">
      ASADUZZAMAN
    </text>
    
    <!-- Main name text -->
    <text x="0" y="0" text-anchor="middle" font-family="'Trebuchet MS', 'Courier New', monospace" font-size="32" font-weight="bold" letter-spacing="8" fill="#ff4444" filter="url(#glow)">
      ASADUZZAMAN
    </text>

    <!-- Decorative underline -->
    <line x1="-160" y1="8" x2="160" y2="8" stroke="#ff2222" stroke-width="1" opacity="0.6"/>
    <line x1="-120" y1="12" x2="120" y2="12" stroke="#ff4444" stroke-width="0.5" opacity="0.4"/>
    
    <!-- Small tomoe decorations on sides -->
    <g transform="translate(-175, 0)">
      <circle cx="0" cy="0" r="4" fill="none" stroke="#ff3333" stroke-width="1" opacity="0.7"/>
      <circle cx="0" cy="0" r="1.5" fill="#ff3333" opacity="0.7"/>
    </g>
    <g transform="translate(175, 0)">
      <circle cx="0" cy="0" r="4" fill="none" stroke="#ff3333" stroke-width="1" opacity="0.7"/>
      <circle cx="0" cy="0" r="1.5" fill="#ff3333" opacity="0.7"/>
    </g>

    <!-- Subtitle -->
    <text x="0" y="26" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="11" fill="#ff8888" letter-spacing="4" opacity="0.7">
      THE SHARINGAN OF INNOVATION
    </text>
  </g>

  <!-- ====== Decorative Elements ====== -->
  
  <!-- Left decorative sharingan mini -->
  <g transform="translate(80, 100)" opacity="0.25">
    <circle cx="0" cy="0" r="18" fill="#1a0000" stroke="#ff2222" stroke-width="1"/>
    <circle cx="0" cy="0" r="12" fill="#cc0000"/>
    <g fill="none" stroke="#ff1111" stroke-width="1.2">
      <path d="M 0 -10 L 1.5 -3 L -1.5 -3 Z" fill="#ff1111"/>
      <path d="M 8.6 5 L 2.5 1.5 L 2 5.5 Z" fill="#ff1111"/>
      <path d="M -8.6 5 L -2.5 1.5 L -2 5.5 Z" fill="#ff1111"/>
    </g>
    <circle cx="0" cy="0" r="2.5" fill="#000"/>
    <circle cx="-1" cy="-1" r="1" fill="#ff6666"/>
    <!-- Pulse animation -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#ff3333" stroke-width="0.5" opacity="0.5">
      <animate attributeName="r" values="18;22;18" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Right decorative sharingan mini -->
  <g transform="translate(720, 100)" opacity="0.25">
    <circle cx="0" cy="0" r="18" fill="#1a0000" stroke="#ff2222" stroke-width="1"/>
    <circle cx="0" cy="0" r="12" fill="#cc0000"/>
    <g fill="none" stroke="#ff1111" stroke-width="1.2">
      <path d="M 0 -10 L 1.5 -3 L -1.5 -3 Z" fill="#ff1111"/>
      <path d="M 8.6 5 L 2.5 1.5 L 2 5.5 Z" fill="#ff1111"/>
      <path d="M -8.6 5 L -2.5 1.5 L -2 5.5 Z" fill="#ff1111"/>
    </g>
    <circle cx="0" cy="0" r="2.5" fill="#000"/>
    <circle cx="-1" cy="-1" r="1" fill="#ff6666"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#ff3333" stroke-width="0.5" opacity="0.5">
      <animate attributeName="r" values="18;22;18" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Top decorative line pattern -->
  <g opacity="0.15">
    <line x1="200" y1="15" x2="600" y2="15" stroke="#ff3333" stroke-width="0.5"/>
    <line x1="250" y1="20" x2="550" y2="20" stroke="#ff3333" stroke-width="0.3"/>
  </g>

  <!-- ====== ANIMATED CHAKRA PARTICLES ====== -->
  <g opacity="0.4">
    <circle cx="120" cy="50" r="1.5" fill="#ff4444">
      <animate attributeName="cy" values="50;30;50" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="160" r="1" fill="#ff6666">
      <animate attributeName="cy" values="160;140;160" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="175" r="1.2" fill="#ff8888">
      <animate attributeName="cy" values="175;160;175" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="35" r="1" fill="#ff4444">
      <animate attributeName="cy" values="35;20;35" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Flames at bottom -->
  <g opacity="0.08" transform="translate(0, 185)">
    <path d="M 0 0 Q 50 -15 100 0 Q 150 -10 200 0 Q 250 -18 300 0 Q 350 -12 400 0 Q 450 -16 500 0 Q 550 -10 600 0 Q 650 -14 700 0 Q 750 -8 800 0" fill="none" stroke="#ff3333" stroke-width="1.5"/>
  </g>

</svg>
